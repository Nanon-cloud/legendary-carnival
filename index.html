<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thai Consonant Drill</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="name-screen">
        <h1>Welcome to Thai Consonant Drill</h1>
        <div id="name-hearts">❤️❤️❤️</div>
        <input type="text" id="name-input" placeholder="Enter your name">
        <button id="start-btn">Start Drill</button>
    </div>

    <div id="drill-screen" style="display: none;">
        <h2 id="greeting"></h2>
        <div id="hearts">❤️❤️❤️</div>
        <div id="streak">Streak: 0</div>
        <div id="question"></div>
        <div id="options"></div>
        <div id="feedback" style="display: none;"></div>
        <button id="next-btn" style="display: none;">Next</button>
    </div>

    <div id="game-over" style="display: none;">
        <h2>Game Over</h2>
        <p>You ran out of hearts!</p>
        <button id="restart-btn">Restart</button>
    </div>

    <div id="congratulations" style="display: none;">
        <h2>Congratulations!</h2>
        <p>You completed the drill!</p>
        <button id="restart-btn2">Restart</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
